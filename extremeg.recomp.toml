# ============================================================================
#  Extreme-G (N64, US) — N64Recomp Configuration
# ============================================================================
#
#  Static recompilation config for Extreme-G (1998, Acclaim / Probe Entertainment)
#  ROM: extremeg_recomp.z64 (patched with decompressed LZSS code)
#  Game Code: NEGE | CRC1: 0xFDA245D2
#
#  The original ROM uses LZSS compression for the game code.
#  Use tools/build_recomp_rom.py to create the patched ROM first.
# ============================================================================

[input]
# entrypoint omitted — our code is LZSS-compressed and doesn't sit at ROM 0x1000
# The function "recomp_entrypoint" is defined directly in symbols.toml
symbols_file_path = "symbols.toml"
rom_file_path = "extremeg_recomp.z64"
output_func_path = "RecompiledFuncs"
single_file_output = false
functions_per_output_file = 50

# ============================================================================
#  Patches
# ============================================================================
#
#  N64Recomp's built-in symbol lists automatically handle common libultra
#  functions (osCreateThread, osSendMesg, sinf, cosf, memcpy, etc.)
#  Only list game-specific overrides here.

[patches]

# Functions renamed to avoid MSVC / C runtime conflicts
renamed = []

# Functions to stub out (replace with empty return)
stubs = [
    # Boot/init code uses COP0 hardware registers (bc0f, mtc0, etc.)
    # Hardware init is handled by ultramodern at runtime
    "recomp_entrypoint",
